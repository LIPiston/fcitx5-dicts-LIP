name: Update-dicts

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日 00:00 UTC 执行
  workflow_dispatch:      # 允许手动触发

jobs:
  update-words:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 检出代码

    - name: get-dicts
      run: |
        mkdir -p cn_dicts
        wget https://github.com/outloudvi/mw2fcitx/releases/latest/download/moegirl.dict -O cn_dicts/moegirl.dict
        wget "https://pinyin.sogou.com/d/dict/download_cell.php?id=4&name=%E7%BD%91%E7%BB%9C%E6%B5%81%E8%A1%8C%E6%96%B0%E8%AF%8D" -O downloaded_hotwords.scel
        wget https://github.com/oldherl/fcitx5-pinyin-minecraft/releases/latest/download/minecraft-cn.dict -O cn_dicts/minecraft-cn.dict
        wget https://github.com/wuhgit/CustomPinyinDictionary/releases/download/assets/CustomPinyinDictionary_Fcitx.dict -O cn_dicts/CustomPinyinDictionary_Fcitx.dict

    - name: convert-dicts
      run: |
        wget https://github.com/studyzy/imewlconverter/releases/download/v3.2.0/imewlconverter_Linux.tar.gz
        tar -zxvf imewlconverter_Linux.tar.gz 
        sudo apt-get update && sudo apt-get install -y dotnet-sdk-8.0
        dotnet publish/ImeWlConverterCmd.dll -i:scel downloaded_hotwords.scel -os:linux -o:libpy cn_dicts/hotwords.dict

    - name: Commit changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add cn_dicts/*
        git commit -m "Auto: Update dicts $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push
